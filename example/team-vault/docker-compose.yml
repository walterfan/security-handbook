version: "3.9"

services:
  # ── FastAPI Backend ───────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - TEAMVAULT_DATABASE_URL=sqlite+aiosqlite:///./data/teamvault.db
      - TEAMVAULT_OPENFGA_API_URL=http://openfga:8080
      - TEAMVAULT_OPA_URL=http://opa:8181
    depends_on:
      openfga:
        condition: service_healthy
      opa:
        condition: service_started
    volumes:
      - backend-data:/app/data

  # ── OpenFGA (ReBAC Engine) — ch14 ────────────────────
  openfga:
    image: openfga/openfga:latest
    command: run
    ports:
      - "8080:8080"   # API
      - "3000:3000"   # Playground UI
    environment:
      - OPENFGA_DATASTORE_ENGINE=postgres
      - OPENFGA_DATASTORE_URI=postgres://openfga:openfga@postgres:5432/openfga?sslmode=disable
      - OPENFGA_PLAYGROUND_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── OPA (Policy Engine) — ch15 ───────────────────────
  opa:
    image: openpolicyagent/opa:latest
    ports:
      - "8181:8181"
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "/policies"
    volumes:
      - ./opa/policies:/policies:ro

  # ── PostgreSQL (OpenFGA storage) ─────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=openfga
      - POSTGRES_PASSWORD=openfga
      - POSTGRES_DB=openfga
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfga"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  backend-data:
  pg-data:
