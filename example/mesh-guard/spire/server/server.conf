# SPIRE Server Configuration (ch20: SPIRE)
#
# The SPIRE Server is the central authority that:
#   - Manages the trust domain (spiffe://mesh-guard)
#   - Issues X.509-SVIDs to workloads via agents
#   - Maintains the registration entries database
#   - Rotates CA certificates automatically

server {
    # Bind address for the SPIRE Server API
    bind_address = "0.0.0.0"
    bind_port = "8081"

    # Trust domain — all SPIFFE IDs start with this prefix (ch19)
    trust_domain = "mesh-guard"

    # Data directory for server state
    data_dir = "/opt/spire/data/server"

    # Log level
    log_level = "INFO"

    # CA configuration
    ca_ttl = "24h"          # CA certificate TTL
    default_x509_svid_ttl = "1h"  # Short-lived SVIDs (ch23: zero trust)
    default_jwt_svid_ttl = "5m"   # Very short JWT-SVIDs
}

plugins {
    # DataStore — stores registration entries and CA state
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "/opt/spire/data/server/datastore.sqlite3"
        }
    }

    # NodeAttestor — how agents prove their identity to the server
    # Using join_token for simplicity; production would use
    # aws_iid, k8s_sat, or TPM-based attestation
    NodeAttestor "join_token" {
        plugin_data {}
    }

    # KeyManager — manages the server's signing keys
    KeyManager "disk" {
        plugin_data {
            keys_path = "/opt/spire/data/server/keys.json"
        }
    }
}
