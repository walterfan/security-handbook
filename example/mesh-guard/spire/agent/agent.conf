# SPIRE Agent Configuration (ch20: SPIRE)
#
# The SPIRE Agent runs on each node and:
#   - Attests to the SPIRE Server (proves node identity)
#   - Exposes the Workload API (Unix domain socket)
#   - Issues X.509-SVIDs to workloads based on selectors
#   - Automatically rotates certificates before expiry

agent {
    # Data directory for agent state
    data_dir = "/opt/spire/data/agent"

    # Log level
    log_level = "INFO"

    # SPIRE Server address
    server_address = "spire-server"
    server_port = "8081"

    # Trust domain must match the server
    trust_domain = "mesh-guard"

    # Workload API socket path — workloads connect here (ch19)
    socket_path = "/tmp/spire-agent/public/api.sock"

    # Trust bundle path (bootstrapped from server)
    trust_bundle_path = "/opt/spire/conf/agent/bootstrap.crt"
}

plugins {
    # NodeAttestor — matches the server's NodeAttestor
    NodeAttestor "join_token" {
        plugin_data {}
    }

    # WorkloadAttestor — identifies workloads by process attributes
    # Uses Unix selectors (PID, UID, GID) for container environments
    WorkloadAttestor "unix" {
        plugin_data {}
    }

    # KeyManager — manages the agent's keys
    KeyManager "disk" {
        plugin_data {
            directory = "/opt/spire/data/agent"
        }
    }
}
