version: "3.9"

services:
  # ── API Gateway (ch12, ch23, ch26) ────────────────────
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8080:8080"
    environment:
      - ORDER_SERVICE_URL=http://order-service:8443
      - HMAC_SECRET=demo-secret-change-me
    labels:
      app: api-gateway
    depends_on:
      - order-service
    volumes:
      - spire-agent-socket:/tmp/spire-agent/public

  # ── Order Service (ch19, ch23) ────────────────────────
  order-service:
    build: ./services/order-service
    environment:
      - PORT=8443
      - PAYMENT_SERVICE_URL=http://payment-service:8444
    labels:
      app: order-service
    depends_on:
      - payment-service
    volumes:
      - spire-agent-socket:/tmp/spire-agent/public

  # ── Payment Service (ch19, ch23, ch27) ────────────────
  payment-service:
    build: ./services/payment-service
    environment:
      - PORT=8444
      - VAULT_ADDR=http://vault:8200
    labels:
      app: payment-service
    volumes:
      - spire-agent-socket:/tmp/spire-agent/public

  # ── SPIRE Server (ch20) ──────────────────────────────
  spire-server:
    image: ghcr.io/spiffe/spire-server:1.10.4
    command: ["-config", "/opt/spire/conf/server/server.conf"]
    ports:
      - "8081:8081"
    volumes:
      - ./spire/server/server.conf:/opt/spire/conf/server/server.conf:ro
      - spire-server-data:/opt/spire/data/server
    healthcheck:
      test: ["/opt/spire/bin/spire-server", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── SPIRE Agent (ch20) ───────────────────────────────
  spire-agent:
    image: ghcr.io/spiffe/spire-agent:1.10.4
    command: ["-config", "/opt/spire/conf/agent/agent.conf"]
    depends_on:
      spire-server:
        condition: service_healthy
    volumes:
      - ./spire/agent/agent.conf:/opt/spire/conf/agent/agent.conf:ro
      - spire-agent-socket:/tmp/spire-agent/public
      - spire-agent-data:/opt/spire/data/agent
    pid: "host"  # Required for Unix workload attestor

  # ── OPA (ch15, ch23) ─────────────────────────────────
  opa:
    image: openpolicyagent/opa:latest
    ports:
      - "8181:8181"
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "/policies"
    volumes:
      - ./opa/policies:/policies:ro

  # ── Vault (ch27) ─────────────────────────────────────
  vault:
    image: hashicorp/vault:1.17
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=dev-root-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/data

volumes:
  spire-server-data:
  spire-agent-data:
  spire-agent-socket:
  vault-data:
