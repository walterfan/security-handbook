# DevSecOps Security Scan — GitHub Actions Workflow (ch29)
#
# Triggers:
#   - On every PR (shift-left)
#   - Nightly full scan
#   - Manual trigger for release gate
#
# Stages:
#   1. SAST (Bandit + Semgrep)
#   2. SCA (pip-audit)
#   3. Secret Detection (detect-secrets)
#   4. Container Scan (Trivy)
#   5. Quality Gate (pass/fail)

name: Security Scan

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Nightly at 2 AM UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: read
  security-events: write  # For SARIF upload

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install bandit pip-audit detect-secrets

      # ── Stage 1: SAST ────────────────────────────────
      - name: "SAST: Bandit scan"
        run: |
          bandit -r sample-app/src/ -f sarif -o reports/bandit.sarif || true
        continue-on-error: true

      # ── Stage 2: SCA ─────────────────────────────────
      - name: "SCA: pip-audit"
        run: |
          pip-audit -r sample-app/requirements.txt --format json --output reports/pip-audit.json || true
        continue-on-error: true

      # ── Stage 3: Secret Detection ────────────────────
      - name: "Secrets: detect-secrets"
        run: |
          detect-secrets scan sample-app/ --json > reports/secrets.json || true
        continue-on-error: true

      # ── Stage 4: Container Scan ──────────────────────
      - name: "Container: Trivy scan"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'sample-app/'
          format: 'sarif'
          output: 'reports/trivy.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      # ── Stage 5: Quality Gate ────────────────────────
      - name: "Quality Gate: Run pipeline"
        run: |
          python -m pipeline.runner --target ./sample-app --output ./reports

      # ── Upload SARIF to GitHub Security tab ──────────
      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/
          category: devsecops-scan

      # ── Archive reports ──────────────────────────────
      - name: Upload scan reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: reports/
          retention-days: 30
