version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SECURENOTE_DATABASE_URL=sqlite+aiosqlite:///./data/securenote.db
      - SECURENOTE_JWT_PRIVATE_KEY_PATH=/app/certs/jwt_private.pem
      - SECURENOTE_JWT_PUBLIC_KEY_PATH=/app/certs/jwt_public.pem
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
